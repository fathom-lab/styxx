name: cognitive-telescope

# Daily cognometric measurement layer for fathom.darkflobi.com/scoreboard.
#
# Runs telescope/run.py against every available frontier model (any vendor with
# its key set in repo secrets), scores each response with styxx, commits the
# results back to telescope/data/. The site fetches telescope/data/latest.json
# directly from raw.githubusercontent.com — no /api/* hop.
#
# Configure these repo secrets (Settings → Secrets and variables → Actions):
#   TELESCOPE_OPENAI_KEY       openai api key (gpt-5*, gpt-4*)
#   TELESCOPE_ANTHROPIC_KEY    anthropic api key (claude-*)
#   TELESCOPE_OPENROUTER_KEY   (optional) openrouter — broad cheap coverage
#
# Budget reference (21 prompts, ~500 output tok per call):
#   fast tier only (haiku + gpt-5-mini)         ~$0.07/day  ≈ $2/mo
#   + deepseek-coder-v3 via openrouter          +$0.005/day
#   full suite incl. opus + gpt-5               ~$3-5/day
# Keep secrets minimal until you want full-suite spend.

on:
  schedule:
    - cron: '0 14 * * *'   # 14:00 UTC daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run (no API calls)'
        required: false
        default: 'false'
      models:
        description: 'comma-separated subset (default: all available)'
        required: false
        default: ''

jobs:
  telescope:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # No vendor keys configured is an expected CONFIGURATION state, not a failure — skip green with a
      # notice instead of red-Xing the repo daily. The schedule stays armed: add any TELESCOPE_* secret and
      # the next run scores for real. (run.py exiting 1 on "no usable models" is correct CLI behavior; the
      # skip belongs here, at the config layer.)
      - name: check vendor keys
        id: keys
        env:
          K1: ${{ secrets.TELESCOPE_OPENAI_KEY }}
          K2: ${{ secrets.TELESCOPE_ANTHROPIC_KEY }}
          K3: ${{ secrets.TELESCOPE_OPENROUTER_KEY }}
        run: |
          if [ -z "$K1$K2$K3" ]; then
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::telescope skipped — no TELESCOPE_* vendor key secrets configured (expected state, not a failure)"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: install deps
        if: steps.keys.outputs.present == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -U 'styxx>=7.1.0' 'anthropic>=0.86' 'openai>=1.50'

      - name: run telescope
        if: steps.keys.outputs.present == 'true'
        env:
          # map TELESCOPE_* repo secrets onto the env vars run.py reads
          OPENAI_API_KEY:     ${{ secrets.TELESCOPE_OPENAI_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.TELESCOPE_ANTHROPIC_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.TELESCOPE_OPENROUTER_KEY }}
          PYTHONIOENCODING:   utf-8
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ -n "${{ github.event.inputs.models }}" ]; then ARGS="$ARGS --models ${{ github.event.inputs.models }}"; fi
          python -X utf8 telescope/run.py $ARGS

      - name: commit daily snapshot
        if: steps.keys.outputs.present == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "cognitive-telescope"
          git config user.email "telescope@fathom.darkflobi.com"
          git add telescope/data/
          if git diff --cached --quiet; then
            echo "no changes — telescope produced no new data"
          else
            git commit -m "telescope: $(date -u +%Y-%m-%d) daily snapshot"
            git push
          fi
