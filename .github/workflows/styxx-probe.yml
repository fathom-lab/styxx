# styxx cognitive regression test
#
# runs on every PR. fails the build if the agent's cognitive
# health drops below threshold or new vulnerabilities appear.
#
# usage: copy this file to .github/workflows/styxx-probe.yml
# in your agent's repo. customize thresholds as needed.
#
# docs: https://fathom.darkflobi.com/styxx

name: styxx cognitive probe

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  cognitive-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install styxx
          pip install -r requirements.txt 2>/dev/null || true

      - name: Run cognitive regression test
        run: |
          styxx ci-test \
            --min-pass 0.80 \
            --min-conf 0.30 \
            --max-warn 0.25 \
            --window 50
        env:
          STYXX_AGENT_NAME: ${{ github.repository }}
          STYXX_AUTO_FEEDBACK: "1"

      - name: Generate compliance report
        if: always()
        run: |
          styxx export --days 7 --format markdown --out cognitive-report.md

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cognitive-report
          path: cognitive-report.md
