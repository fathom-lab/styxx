name: tests

# Runs the test suite on every push to main and every PR, across the full
# range of Python versions the package claims to support (>=3.9). Before this
# workflow existed, 994 tests gated nothing in CI: a Python-3.12-only f-string
# that broke import on 3.9-3.11, and a real subpackage missing from the
# packaging list, both shipped undetected. The matrix below catches that class
# of defect — ruff (E9) and the import smoke fail fast on a syntax break, and
# the separate `package` job builds the wheel and asserts every subpackage and
# module is actually inside it (an editable install can't catch a packaging
# gap, because it imports straight from the source tree).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install styxx + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Lint (ruff — pinned to py39, catches the 3.9-3.11 syntax class)
        run: python -m ruff check styxx

      - name: Import smoke (every top-level module must import on this version)
        run: |
          python -c "import styxx; print('styxx', styxx.__version__)"
          python -c "import styxx.scan, styxx.three_axis, styxx.cognometrics"
          # styxx.mcp.server needs the mcp package (gated to py>=3.10); import it only when mcp is present.
          python -c "import importlib.util; m = importlib.import_module('styxx.mcp.server') if importlib.util.find_spec('mcp') else None; print('styxx.mcp.server', 'OK' if m else 'skipped (mcp absent on this python)')"

      - name: Run tests
        run: python -m pytest tests -q

  package:
    name: wheel packaging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Verify all subpackages + key modules are in the wheel
        run: |
          python - <<'PY'
          import glob
          import zipfile

          wheel = sorted(glob.glob("dist/*.whl"))[-1]
          names = set(zipfile.ZipFile(wheel).namelist())

          # Every real package dir (one with __init__.py) must ship.
          required = [
              "styxx/__init__.py",
              "styxx/scan.py",
              "styxx/three_axis/__init__.py",
              "styxx/guardrail/__init__.py",
              "styxx/adapters/__init__.py",
              "styxx/compliance/__init__.py",
              "styxx/cognometrics.py",
              "styxx/mcp/server.py",
              "styxx/residual_probe/probe.py",
          ]
          missing = [m for m in required if m not in names]
          if missing:
              raise SystemExit(f"wheel is missing: {missing}")

          # Bundled data files the runtime loads by path must ship too.
          for ext in (".pt", ".json", ".ttf", ".jsonl"):
              if not any(n.endswith(ext) for n in names):
                  raise SystemExit(f"no {ext} data files in wheel")

          print(f"{wheel}: packaging OK ({len(names)} entries)")
          PY

  core-minimal:
    # Guards against optional-dependency creep into core. A bare
    # `pip install styxx` (numpy only, no extras) must import AND run the core
    # public surface. This is the class of bug that shipped preflight()
    # secretly requiring `mcp`: the audit logic used to live in
    # styxx.mcp.server (it now lives in the mcp-free styxx.cognometrics; the
    # server is a thin transport adapter), and every editable / [test] install
    # already had mcp, so it passed locally and across the matrix until a truly
    # minimal install was exercised.
    name: core-minimal (numpy-only install)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install styxx with NO extras
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Core surface must import + run with numpy only
        run: |
          python - <<'PY'
          import importlib, styxx

          # Core modules must import with no optional dependency installed.
          # styxx.mcp.server is included because the transport adapter must
          # still import without the mcp SDK (it re-exports the core logic).
          for m in [
              "styxx.scan", "styxx.three_axis", "styxx.preflight",
              "styxx.cognometrics", "styxx.coherence", "styxx.attack",
              "styxx.mcp.server",
          ]:
              importlib.import_module(m)

          # Core calls must RUN — these are the paths that regressed when
          # preflight reached into styxx.mcp.server (which imports the mcp SDK).
          r = styxx.preflight("what is 2+2?", "the answer is 4", persist=False)
          assert type(r).__name__ == "PreflightResult", r
          styxx.recover_posture(last_n=5)

          # The cognometric tool-logic now lives in the mcp-free core module;
          # it AND the back-compat re-export through the transport adapter must
          # import (and be the same objects) without the mcp SDK installed.
          from styxx.cognometrics import tool_cogn_audit, tool_cogn_recover_posture
          from styxx.mcp.server import (
              tool_cogn_audit as _srv_audit,
              tool_cogn_recover_posture as _srv_recover,
          )
          assert callable(tool_cogn_audit) and callable(tool_cogn_recover_posture)
          assert _srv_audit is tool_cogn_audit and _srv_recover is tool_cogn_recover_posture

          print("core-minimal: numpy-only surface imports and runs OK")
          PY
