[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "styxx"
version = "2.0.0"
description = "nothing crosses unseen. the first drop-in cognitive vitals monitor for llm agents."
readme = "README.md"
license = { text = "MIT" }
authors = [
    { name = "flobi", email = "heyzoos123@gmail.com" }
]
maintainers = [
    { name = "flobi", email = "heyzoos123@gmail.com" }
]
requires-python = ">=3.9"
keywords = [
    "llm",
    "agent",
    "cognitive",
    "vitals",
    "monitor",
    "interpretability",
    "hallucination",
    "fathom",
    "sae",
    "cognitive-state",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]
dependencies = [
    "numpy>=1.24",
]

[project.optional-dependencies]
openai  = ["openai>=1.0"]
anthropic = ["anthropic>=0.20"]
# 0.5.4: framework integrations
langchain = ["langchain-core>=0.1"]
crewai = ["crewai>=0.1", "langchain-core>=0.1"]
autogen = ["pyautogen>=0.2"]
# 0.7.0: observability platform integrations
langsmith = ["langsmith>=0.1", "langchain-core>=0.1"]
langfuse = ["langfuse>=2.0", "langchain-core>=0.1"]
# 0.1.0a4: agent-card PNG renderer needs Pillow
agent-card = ["Pillow>=10.0"]
# 0.3.0: tier 1 D-axis honesty — needs a local model
tier1 = [
    "torch>=2.1",
    "transformers>=4.40",
    "transformer-lens>=2.0",
]
# 0.4.0: tier 2 K/C/S SAE instruments — needs circuit-tracer
tier2 = [
    "torch>=2.1",
    "transformers>=4.40",
    "transformer-lens>=2.0",
    "circuit-tracer>=0.4",
]
dev = [
    "pytest>=7.0",
    "ruff>=0.1",
]

[project.urls]
Homepage       = "https://fathom.darkflobi.com/styxx"
Documentation  = "https://fathom.darkflobi.com/styxx"
"Fathom Lab"   = "https://fathom.darkflobi.com/"
"Research Paper" = "https://doi.org/10.5281/zenodo.19326174"
"@fathom_lab"  = "https://x.com/fathom_lab"
"Source"       = "https://github.com/heyzoos123-blip/styxx"
"Issue Tracker" = "https://github.com/heyzoos123-blip/styxx/issues"

[project.scripts]
styxx = "styxx.cli:main"

[tool.setuptools]
packages = ["styxx", "styxx.adapters", "styxx.centroids", "styxx.recipes"]

[tool.setuptools.package-data]
"styxx.centroids" = ["*.json"]
